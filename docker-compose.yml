services:
  postgres:
    image: postgres:16
    container_name: casecell-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casecell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casecell}
      POSTGRES_DB: ${POSTGRES_DB:-casecell}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-casecell}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: casecell-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: casecell-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://casecell:casecell@postgres:5432/casecell
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/bin/sh", "-c", "npx prisma migrate deploy && npx prisma db push --skip-generate && npx prisma db seed && node dist/main.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend-tests:
    profiles: ["test"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://casecell:casecell@postgres:5432/casecell
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql://casecell:casecell@postgres:5432/casecell}
      NODE_ENV: test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/bin/sh", "-c", "npm run prisma:deploy && npm run prisma:push && npm test"]

  frontend-tests:
    profiles: ["test"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      NODE_ENV: test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/bin/sh", "-c", "npm run lint && npm run test:unit && npm run test:integration && npm run test:e2e"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
        NEXT_PUBLIC_DEFAULT_THEME: ${NEXT_PUBLIC_DEFAULT_THEME:-dark}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:3001}
    container_name: casecell-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_DEFAULT_THEME: ${NEXT_PUBLIC_DEFAULT_THEME:-dark}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:3001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
